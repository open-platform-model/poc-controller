# OCIRepository pointing to the test module published by the local registry.
# Requires `make connect-registry` so that opm-registry:5000 is reachable in-cluster.
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: test-hello
  namespace: default
spec:
  interval: 1m
  url: oci://opm-registry:5000/opmodel.dev/test/hello
  insecure: true
