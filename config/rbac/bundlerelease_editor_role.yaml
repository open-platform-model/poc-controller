# This rule is not used by the project poc-controller itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the releases.opmodel.dev.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: poc-controller
    app.kubernetes.io/managed-by: kustomize
  name: bundlerelease-editor-role
rules:
- apiGroups:
  - releases.opmodel.dev
  resources:
  - bundlereleases
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - releases.opmodel.dev
  resources:
  - bundlereleases/status
  verbs:
  - get
