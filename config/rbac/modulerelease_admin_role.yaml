# This rule is not used by the project poc-controller itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over releases.opmodel.dev.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: poc-controller
    app.kubernetes.io/managed-by: kustomize
  name: modulerelease-admin-role
rules:
- apiGroups:
  - releases.opmodel.dev
  resources:
  - modulereleases
  verbs:
  - '*'
- apiGroups:
  - releases.opmodel.dev
  resources:
  - modulereleases/status
  verbs:
  - get
