version: '3'

silent: true

vars:
  IMG: '{{.IMG | default "controller:latest"}}'
  CONTAINER_TOOL: '{{.CONTAINER_TOOL | default "docker"}}'
  LOCALBIN: '{{.ROOT_DIR}}/bin'
  KUBECTL: '{{.KUBECTL | default "kubectl"}}'
  KIND: '{{.KIND | default "kind"}}'
  FLUX: '{{.FLUX | default "flux"}}'
  KUSTOMIZE: '{{.LOCALBIN}}/kustomize'
  CONTROLLER_GEN: '{{.LOCALBIN}}/controller-gen'
  ENVTEST: '{{.LOCALBIN}}/setup-envtest'
  GOLANGCI_LINT: '{{.LOCALBIN}}/golangci-lint'
  KUSTOMIZE_VERSION: v5.8.1
  CONTROLLER_TOOLS_VERSION: v0.20.1
  GOLANGCI_LINT_VERSION: v2.8.0
  ENVTEST_VERSION:
    sh: |
      v=$(go list -m -f '{{`{{if .Replace}}{{.Replace.Version}}{{else}}{{.Version}}{{end}}`}}' sigs.k8s.io/controller-runtime 2>/dev/null)
      [ -n "$v" ] || { echo "Set ENVTEST_VERSION manually (controller-runtime replace has no tag)" >&2; exit 1; }
      printf '%s\n' "$v" | sed -E 's/^v?([0-9]+)\.([0-9]+).*/release-\1.\2/'
  ENVTEST_K8S_VERSION:
    sh: |
      v=$(go list -m -f '{{`{{if .Replace}}{{.Replace.Version}}{{else}}{{.Version}}{{end}}`}}' k8s.io/api 2>/dev/null)
      [ -n "$v" ] || { echo "Set ENVTEST_K8S_VERSION manually (k8s.io/api replace has no tag)" >&2; exit 1; }
      printf '%s\n' "$v" | sed -E 's/^v?[0-9]+\.([0-9]+).*/1.\1/'
  KIND_CLUSTER: '{{.KIND_CLUSTER | default "poc-controller-test-e2e"}}'
  REGISTRY_CONTAINER: '{{.REGISTRY_CONTAINER | default "opm-registry"}}'
  REGISTRY_PORT: '{{.REGISTRY_PORT | default "5000"}}'
  REGISTRY_IMAGE: '{{.REGISTRY_IMAGE | default "registry:2"}}'
  # Used for publishing modules to the local registry
  CUE_REGISTRY: '{{.CUE_REGISTRY | default "testing.opmodel.dev=localhost:5000+insecure,opmodel.dev=localhost:5000+insecure,registry.cue.works"}}'
  # Used in CI and for pulling catalog/test modules from public ghcr
  GHCR_CUE_REGISTRY: '{{.GHCR_CUE_REGISTRY | default "testing.opmodel.dev=ghcr.io/open-platform-model,opmodel.dev=ghcr.io/open-platform-model,registry.cue.works"}}'
  # Used for pulling the local registry from within kind
  KIND_CUE_REGISTRY: '{{.KIND_CUE_REGISTRY | default "testing.opmodel.dev=opm-registry:5000+insecure,opmodel.dev=opm-registry:5000+insecure,registry.cue.works"}}'
  TEST_MODULE_DIR: '{{.TEST_MODULE_DIR | default "test/fixtures/modules/hello"}}'
  PLATFORMS: '{{.PLATFORMS | default "linux/arm64,linux/amd64,linux/s390x,linux/ppc64le"}}'
  IGNORE_NOT_FOUND: '{{.IGNORE_NOT_FOUND | default "false"}}'

includes:
  dev:
    taskfile: ./.tasks/dev.yaml
    vars:
      LOCALBIN: '{{.LOCALBIN}}'
      CONTROLLER_GEN: '{{.CONTROLLER_GEN}}'
      ENVTEST: '{{.ENVTEST}}'
      GOLANGCI_LINT: '{{.GOLANGCI_LINT}}'
      ENVTEST_K8S_VERSION: '{{.ENVTEST_K8S_VERSION}}'
      CUE_REGISTRY: '{{.CUE_REGISTRY}}'
      GHCR_CUE_REGISTRY: '{{.GHCR_CUE_REGISTRY}}'
      KIND: '{{.KIND}}'
      KIND_CLUSTER: '{{.KIND_CLUSTER}}'
      KIND_CUE_REGISTRY: '{{.KIND_CUE_REGISTRY}}'

  operator:
    taskfile: ./.tasks/operator.yaml
    vars:
      KUSTOMIZE: '{{.KUSTOMIZE}}'
      IMG: '{{.IMG}}'
      CUE_REGISTRY: '{{.CUE_REGISTRY}}'
      KIND_CUE_REGISTRY: '{{.KIND_CUE_REGISTRY}}'

  docker:
    taskfile: ./.tasks/docker.yaml
    vars:
      CONTAINER_TOOL: '{{.CONTAINER_TOOL}}'
      IMG: '{{.IMG}}'
      PLATFORMS: '{{.PLATFORMS}}'

  kind:
    taskfile: ./.tasks/kind.yaml
    vars:
      KIND: '{{.KIND}}'
      KUBECTL: '{{.KUBECTL}}'
      IMG: '{{.IMG}}'
      KIND_CLUSTER: '{{.KIND_CLUSTER}}'
      KIND_CUE_REGISTRY: '{{.KIND_CUE_REGISTRY}}'

  registry:
    taskfile: ./.tasks/registry.yaml
    vars:
      CONTAINER_TOOL: '{{.CONTAINER_TOOL}}'
      REGISTRY_CONTAINER: '{{.REGISTRY_CONTAINER}}'
      REGISTRY_PORT: '{{.REGISTRY_PORT}}'
      REGISTRY_IMAGE: '{{.REGISTRY_IMAGE}}'
      CUE_REGISTRY: '{{.CUE_REGISTRY}}'
      TEST_MODULE_DIR: '{{.TEST_MODULE_DIR}}'

  flux:
    taskfile: ./.tasks/flux.yaml
    vars:
      FLUX: '{{.FLUX}}'

  release:
    taskfile: ./.tasks/release.yaml
    vars:
      FLUX: '{{.FLUX}}'
      KUBECTL: '{{.KUBECTL}}'

  module:
    taskfile: ./.tasks/module.yaml
    vars:
      KUBECTL: '{{.KUBECTL}}'
      CUE_REGISTRY: '{{.CUE_REGISTRY}}'
      GHCR_CUE_REGISTRY: '{{.GHCR_CUE_REGISTRY}}'

  tool:
    taskfile: ./.tasks/tools.yaml
    internal: true
    vars:
      LOCALBIN: '{{.LOCALBIN}}'
      CONTROLLER_GEN: '{{.CONTROLLER_GEN}}'
      KUSTOMIZE: '{{.KUSTOMIZE}}'
      ENVTEST: '{{.ENVTEST}}'
      GOLANGCI_LINT: '{{.GOLANGCI_LINT}}'
      KUSTOMIZE_VERSION: '{{.KUSTOMIZE_VERSION}}'
      CONTROLLER_TOOLS_VERSION: '{{.CONTROLLER_TOOLS_VERSION}}'
      GOLANGCI_LINT_VERSION: '{{.GOLANGCI_LINT_VERSION}}'
      ENVTEST_VERSION: '{{.ENVTEST_VERSION}}'
      ENVTEST_K8S_VERSION: '{{.ENVTEST_K8S_VERSION}}'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list
