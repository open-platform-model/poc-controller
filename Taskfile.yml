version: '3'

# Silent by default - set TASK_VERBOSE=1 or use --verbose to show commands
silent: true

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  help:
    desc: Show available tasks
    cmds:
      - make help

  manifests:
    desc: Generate CRDs and RBAC manifests
    cmds:
      - make manifests

  generate:
    desc: Generate deepcopy code
    cmds:
      - make generate

  fmt:
    desc: Format Go code
    cmds:
      - make fmt

  vet:
    desc: Run go vet
    cmds:
      - make vet

  lint:
    desc: Run golangci-lint
    cmds:
      - make lint

  lint-fix:
    desc: Run golangci-lint with fixes
    cmds:
      - make lint-fix

  test:
    desc: Run unit tests
    cmds:
      - make test

  build:
    desc: Build the manager binary
    cmds:
      - make build

  run:
    desc: Run the controller locally
    cmds:
      - make run

  install:
    desc: Install CRDs
    cmds:
      - make install

  uninstall:
    desc: Uninstall CRDs
    cmds:
      - make uninstall

  deploy:
    desc: Deploy the controller manager
    cmds:
      - make deploy

  undeploy:
    desc: Remove the controller manager
    cmds:
      - make undeploy

  kind-load:
    desc: Build and load controller image into Kind cluster
    cmds:
      - make kind-load

  docker-build:
    desc: Build the manager image
    cmds:
      - make docker-build

  docker-push:
    desc: Push the manager image
    cmds:
      - make docker-push

  build-installer:
    desc: Build consolidated install manifest
    cmds:
      - make build-installer

  install-flux:
    desc: Install Flux source-controller
    cmds:
      - make install-flux

  uninstall-flux:
    desc: Uninstall Flux
    cmds:
      - make uninstall-flux

  local-run:
    desc: Deploy controller to local Kind cluster (full setup)
    cmds:
      - make local-run

  local-clean:
    desc: Tear down local Kind cluster and deployment
    cmds:
      - make local-clean

  apply-samples:
    desc: Apply sample CRs to the cluster
    cmds:
      - make apply-samples

  start-registry:
    desc: Start the local OCI registry
    cmds:
      - make start-registry

  connect-registry:
    desc: Connect local registry to Kind network
    cmds:
      - make connect-registry

  publish-test-module:
    desc: Publish test hello module to local registry
    cmds:
      - make publish-test-module
